{% extends 'cars/base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-20">
    <div class="glass border border-slate-700 p-10 rounded-[40px] shadow-2xl">
        <h2 class="text-4xl font-black mb-8 tracking-tighter text-center">УВІЙТИ</h2>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" 
                           class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-4 text-white focus:border-blue-500 outline-none transition-all">
                </div>
            {% endfor %}
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl uppercase tracking-widest transition-all">Увійти</button>
        </form>
        
        <p class="mt-8 text-center text-slate-500 text-xs">
            Немає аккаунту? <a href="{% url 'signup' %}" class="text-blue-500 font-bold hover:underline">Створити зараз</a>
        </p>
    </div>
</div>
{% endblock %}
