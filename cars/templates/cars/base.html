<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="font-sans antialiased">
    <nav class="glass sticky top-0 z-50 border-b border-slate-700 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tighter text-blue-500">EV <span class="text-white">CATALOG</span></a>
                        <div class="flex items-center space-x-6 text-sm uppercase tracking-widest">
                <a href="{% url 'catalog' %}" class="hover:text-blue-400 transition">Каталог</a>
                <a href="{% url 'compare' %}" class="hover:text-blue-400 transition">Порівняння</a>
                
                {% if user.is_authenticated %}
                    <!-- Якщо користувач увійшов -->
                    <div class="flex items-center space-x-4 border-l border-slate-700 pl-6 ml-2">
                        <a href="{% url 'profile' %}" class="text-blue-500 font-black italic hover:underline">{{ user.username }}</a>
                        <a href="{% url 'logout' %}" class="text-slate-500 hover:text-red-500 transition text-[10px] font-bold">Вийти</a>
                    </div>
                {% else %}
                    <!-- Якщо користувач гість -->
                    <a href="{% url 'login' %}" class="border border-blue-500 px-4 py-2 rounded-full hover:bg-blue-500 hover:text-white transition">Увійти</a>
                {% endif %}
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
